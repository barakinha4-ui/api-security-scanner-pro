version: '3.8'

services:
  # Aplicação Principal (FastAPI)
  app:
    build: .
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - PYTHONPATH=/app:/app/src
      - ENV=development
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal_net
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  # Redis para Pub/Sub e Cache
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal_net
    restart: always

  # Celery Worker para execução de scans
  worker:
    build: .
    command: celery -A celery_app worker --loglevel=info -Q scanner --pool=solo
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONPATH=/app:/app/src
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - internal_net
    restart: always

  # Nginx como Proxy Reverso e Servidor Estático
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dashboard:/usr/share/nginx/html:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal_net
    restart: always

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - internal_net
    restart: always

  redis-exporter:
    image: oliver006/redis_exporter:latest
    environment:
      - REDIS_ADDR=redis://redis:6379
    networks:
      - internal_net
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana_datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana_dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana_dashboard.json:/etc/grafana/provisioning/dashboards/scanner_dashboard.json:ro
    depends_on:
      - prometheus
    networks:
      - internal_net
    restart: always

  # vulnerable-api-lab removido (pasta ../vulnerable-api-lab não existe)
  # Descomente e ajuste o path se quiser usar um lab de testes:
  # vulnerable-api-lab:
  #   image: python:3.11-slim
  #   volumes:
  #     - ../vulnerable-api-lab:/lab
  #   command: >
  #     sh -c "pip install fastapi uvicorn && python /lab/main.py"
  #   ports:
  #     - "9000:9000"
  #   networks:
  #     - internal_net
  #   restart: always

networks:
  internal_net:
    driver: bridge
