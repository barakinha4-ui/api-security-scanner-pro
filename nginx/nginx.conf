worker_processes auto;
# PID do processo nginx
pid /run/nginx.pid;

events {
    # Número máximo de conexões simultâneas por worker
    worker_connections 2048;
    multi_accept on;
}

http {
    # Configurações básicas de performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip para reduzir tamanho das respostas
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types application/json text/html text/css application/javascript;

    # Definição de Upstreams (backend app)
    upstream app_backend {
        server app:8000;
        keepalive 32;
    }

    # Configuração do Servidor Principal (Porta 80)
    server {
        listen 80;
        server_name _;

        # Headers de Segurança
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Logs de acesso e erro
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log warn;

        # 1. Dashboard Estático /
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires off;
        }

        # 2. Proxy de API /api/
        location /api/ {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts longos para execuções de scan
            proxy_read_timeout 3600s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
        }

        # 3. WebSocket EXPLICITO /ws/ (Crucial para manter conexão viva)
        location /ws/ {
            proxy_pass http://app_backend;
            
            # Necessário para o upgrade de HTTP para WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Repasse de informações do cliente
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Desabilita buffering para streaming em tempo real
            proxy_buffering off;
            proxy_cache off;

            # Timeouts longos para manter conexão viva
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_connect_timeout 60s;

            # IMPORTANTE: NÃO usar proxy_intercept_errors em WebSocket
            # Isso causa fechamento abrupto sem close frame (erro 1005)
        }

        # 4. Health Check
        location /health {
            proxy_pass http://app_backend/health;
        }

        # 5. Métricas Prometheus
        location /metrics {
            proxy_pass http://app_backend/metrics;
        }
    }
}
