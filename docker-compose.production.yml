version: '3.8'

services:
  # ================================================================
  # Frontend - Next.js
  # ================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_KEY}
      - NEXT_PUBLIC_API_URL=http://app:8000
      - NEXT_PUBLIC_WS_URL=ws://ws:8765
    depends_on:
      - app
      - ws
    networks:
      - internal_net
    restart: always

  # ================================================================
  # Backend API - FastAPI
  # ================================================================
  app:
    build: .
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - PYTHONPATH=/app:/app/src
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    volumes:
      - ./reports:/app/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal_net
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  # ================================================================
  # WebSocket Server
  # ================================================================
  ws:
    build: .
    command: python src/apiscanner/ws_server_standalone.py
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app:/app/src
    ports:
      - "8765:8765"
    networks:
      - internal_net
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  # ================================================================
  # Celery Worker
  # ================================================================
  worker:
    build: .
    command: celery -A celery_app worker --loglevel=info -Q scanner --pool=solo
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONPATH=/app:/app/src
    volumes:
      - ./reports:/app/reports
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - internal_net
    restart: always

  # ================================================================
  # Redis
  # ================================================================
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal_net
    restart: always
    volumes:
      - redis_data:/data

  # ================================================================
  # Nginx Proxy
  # ================================================================
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dashboard:/usr/share/nginx/html:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
      - frontend
    networks:
      - internal_net
    restart: always

  # ================================================================
  # Prometheus
  # ================================================================
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - internal_net
    restart: always

  # ================================================================
  # Grafana
  # ================================================================
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - ./monitoring/grafana_datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana_dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana_dashboard.json:/etc/grafana/provisioning/dashboards/scanner_dashboard.json:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - internal_net
    restart: always

networks:
  internal_net:
    driver: bridge

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
